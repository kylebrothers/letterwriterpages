services:
  promotion-letters:
    build: .
    container_name: promotion-letters-app
    ports:
      - "${HOST_PORT:-5000}:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=false
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-this}
    volumes:
      - promotion_letters_data:/mnt/appdata
    restart: unless-stopped
    networks:
      - promotion-network

volumes:
  promotion_letters_data:
    driver: local
    driver_opts:
      type: nfs
      device: ":/Docker/promotion-letters"
      o: "nfsvers=4,addr=${NAS_IP:-192.168.0.134},soft,rw"

networks:
  promotion-network:
    driver: bridge
